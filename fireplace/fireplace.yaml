term: &term kitty
# All keys are optional an default values will be used
#
# They are however not always useful, e.g. most key bindings will be emtpy.
# We try to point out default values and example values where possible
#

# Logging configuration
logging:
  style: "Compact" # default - ["Compact"|"Full"]
  color: "Always" # default - ["Auto"|"Always"|"Never"] Force or disable colored terminal output

# Key bindings
#
# Bindings are composed of 'modifiers' and a 'key' (not multiple)

# Global actions
keys: # default values:
  terminate: 
    modifiers: ["Logo", "Shift"]
    key: E

# View/Window related actions
view:
  keys:
    close:
      modifiers: ["Logo", "Shift"]
      key: Q

# Execute program
#
# Executions are happening in a shell context, environment variables passed
# to fireplace are available and shell syntax is valid
exec:
  keys:
    {{term}}:
      modifiers: ["Logo"]
      key: Return

# Workspace config
workspace:
  # Workspace key configuration
  #
  # Currently there are workspaces from 1 up to 32, you dont need to use
  # all of them, if there is no key to reach them, they are not created.
  keys:
    workspace1:
      modifiers: ["Logo"]
      key: ampersand
    workspace2:
      modifiers: ["Logo"]
      key: eacute
    workspace3:
      modifiers: ["Logo"]
      key: quotedbl
    workspace4:
      modifiers: ["Logo"]
      key: apostrophe
    workspace5:
      modifiers: ["Logo"]
      key: parenleft
    workspace6:
      modifiers: ["Logo"]
      key: minus
    workspace7:
      modifiers: ["Logo"]
      key: egrave
    workspace8:
      modifiers: ["Logo"]
      key: underscore
    workspace9:
      modifiers: ["Logo"]
      key: ccedilla
    workspace10:
      modifiers: ["Logo"]
      key: agrave
    moveto_workspace1:
      modifiers: ["Logo", "Shift"]
      key: ampersand
    moveto_workspace2:
      modifiers: ["Logo", "Shift"]
      key: eacute
    moveto_workspace3:
      modifiers: ["Logo", "Shift"]
      key: quotedbl
    moveto_workspace4:
      modifiers: ["Logo", "Shift"]
      key: apostrophe
    moveto_workspace5:
      modifiers: ["Logo", "Shift"]
      key: parenleft
    moveto_workspace6:
      modifiers: ["Logo", "Shift"]
      key: minus
    moveto_workspace7:
      modifiers: ["Logo", "Shift"]
      key: egrave
    moveto_workspace8:
      modifiers: ["Logo", "Shift"]
      key: underscore
    moveto_workspace9:
      modifiers: ["Logo", "Shift"]
      key: ccedilla
    moveto_workspace10:
      modifiers: ["Logo", "Shift"]
      key: agrave
