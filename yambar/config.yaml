font: &font mono:size=12
bg_default: &bg_default {stack: [{background: {color: {{background}}FF}}, {underline: {size: 4, color: {{color3}}FF}}]}
std_underline: &std_underline {underline: { size: 2, color: {{color3}}FF}}
bar:
  height: 40
  location: top
  font: *font
  spacing: 5
  margin: 0
  layer: bottom
  foreground: {{foreground}}FF
  background: {{background}}FF
  monitor: *monitor # This is supposed to be set by prepending a line to the yaml file
  left:
  - river:
      anchors:
        - base: &river_base
            left-margin: 10
            right-margin: 13
            default: {string: {text: ""}}
            tag: id
            values:
              1: {string: {text: }}
              2: {string: {text: ➋}}
              3: {string: {text: ➌}}
              4: {string: {text: ➍}}
              5: {string: {text: ➎}}
              6: {string: {text: ➏}}
              7: {string: {text: ➐}}
              8: {string: {text: ➑}}
              9: {string: {text: ➒}}
              10: {string: {text: }}
      content:
        map:
          deco:
            background:
              color: {{color8}}FF
          on-click:
            left: sh -c "riverctl set-focused-tags $((1 << ({id} - 1)))"
            right: sh -c "riverctl toggle-focused-tags $((1 << ({id} -1)))"
            middle: sh -c "riverctl toggle-view-tags $((1 << ({id} -1)))"
          tag: state
          values:
            urgent:
              map:
                <<: *river_base
                deco: {background: {color: {{background}}FF}}
            focused:
              map:
                <<: *river_base
                deco: *bg_default
            visible:
              map:
                tag: occupied
                values:
                  false: {map: {<<: *river_base}}
                  true: {map: {<<: *river_base, deco: *bg_default}}
            unfocused:
              map:
                <<: *river_base
            invisible:
              map:
                tag: occupied
                values:
                  false: {empty: {}}
                  true: {map: {<<: *river_base, deco: {underline: {size: 3, color: {{color3}}FF}}}}
  right:
  - network:
      name: eth0
      content:
      - map:
          deco: *bg_default
          tag: state
          values:
            up:
              string:
                text: ""
  - network:
      name: wlan0
      content:
      - map:
          deco: *bg_default
          tag: state
          default: {string: {text: }}
          values:
            down: {string: {text: }}
            up:
              map:
                tag: ipv4
                default:
                  - string: {text: }
                  - string: {text: "{ssid}"}
                values:
                  "":
                    - string: {text: }
                    - string: {text: "{ssid}", foreground: {{foreground}}FF}
  - cpu:
      content:
      - string:
          deco: *bg_default
          text: "{cpu}%"
  - mem:
      content:
      - string:
          deco: *bg_default
          text: "{percent_used}%"
  - backlight:
      name: intel_backlight
      content:
      - string:
          deco: *bg_default
          text: " {percent}%"
  - battery:
      name: BAT0
      poll-interval: 30
      anchors:
        discharging: &discharging
          list:
            items:
              - ramp:
                  tag: capacity
                  items:
                    - string: {text: , foreground: {{color4}}FF}
                    - string: {text: , foreground: {{color4}}FF}
                    - string: {text: }
                    - string: {text: }
                    - string: {text: }
                    - string: {text: }
                    - string: {text: }
                    - string: {text: }
                    - string: {text: }
                    - string: {text: , foreground: {{color2}}FF}
              - string: {text: "{capacity}% ({estimate})"}
      content:
        map:
          deco: *bg_default
          tag: state
          values:
            unknown:
              <<: *discharging
            discharging:
              <<: *discharging
            charging:
              - string: {text: , foreground: {{color2}}FF}
              - string: {text: "{capacity}% ({estimate})"}
            full:
              - string: {text: , foreground: {{color2}}FF}
              - string: {text: "{capacity}%"}
            not charging:
              - ramp:
                  tag: capacity
                  items:
                    - string: {text:  , foreground: {{color4}}FF}
                    - string: {text:  , foreground: {{color12}}FF}
                    - string: {text:  , foreground: {{color10}}FF}
                    - string: {text:  , foreground: {{color10}}FF}
                    - string: {text:  , foreground: {{color10}}FF}
                    - string: {text:  , foreground: {{color10}}FF}
                    - string: {text:  , foreground: {{color2}}FF}
                    - string: {text:  , foreground: {{color2}}FF}
                    - string: {text:  , foreground: {{color2}}FF}
                    - string: {text:  , foreground: {{color2}}FF}
              - string: {text: "{capacity}%"}
  - clock:
      time-format: "%H:%M %Z"
      content:
        - string:
            text: "{time}"
            deco: *bg_default
