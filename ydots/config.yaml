global:
  installCommand: paru -S --needed --noconfirm %s
  dotfiles: ~/dotfiles
variables:
  color:
    bg: 1E1E2E
    fg: D9E0EE
    0: 6E6C7E
    8: 988BA2
    1: F28FAD
    9: F28FAD
    2: ABE9B3
    10: ABE9B3
    3: FAE3B0
    11: FAE3B0
    4: 96CDFB
    12: 96CDFB
    5: DDB6F2
    13: DDB6F2
    6: F5C2E7
    14: F5C2E7
    7: C3BAC6
    15: D9E0EE
  font: mononoki Nerd Font Mono
  app:
    term: wezterm
    browser: firefox
modules:
  ydots:
    customSteps: echo a
  neovim:
    dirname: nvim
    packageName: neovim-git
    dependencies: 
    - fzf
    - ripgrep
    - bat
    - lazygit
    - ranger
    - xclip
    - python-neovim
    - nvim-packer-git
    - lua51-lyaml
    - rust-analyzer
    - bash-language-server
    - jedi-language-server
  waybar:
    enabled: false
    packageName: waybar
    files:
    - source: style.css
      parse: true
    - config
  yambar:
    packageName: yambar
    files:
      - source: config.yaml
        parse: true
  bin:
    targetDir: ~/bin
  bspwm:
    enabled: false
    packageName: bspwm
    files:
    - source: bspwmrc
      target: bspwm
      parse: true
  fontconfig:
    targetDir: ~/.config/fontconfig/conf.d/
    files:
    - source: monospace
      target: 99-monospace.conf
      parse: true
  kitty:
    enabled: false
    packageName: kitty
    files:
    - source: conf
      target: kitty.conf
    - source: colors
      target: kitty.colors
      parse: true
  lazygit:
    packageName: lazygit
  misc:
    targetDir: '~'
    files:
    - source: xinitrc
      target: .xinitrc
  neofetch:
    packageName: neofetch
  picom:
    enabled: false
    packageName: picom-tryone-git
  polybar:
    enabled: false
    packageName: polybar
    files:
    - source: polybar.conf
      parse: true
  ranger:
    packageName: ranger
  river:
    packageName: river
    dependencies:
    - rivercarro-git
    - disman
    - wofi
    - xwayland
    postSteps:
    - chmod +x ~/.config/river/init
    requires:
    - yambar
    files:
      - source: init
        parse: true
  sxhkd:
    enabled: false
    packageName: sxhkd
  xresources:
    targetDir: '~'
    files:
    - source: xresources
      target: .Xresources
      parse: true
  zsh:
    packageName: zsh
    targetDir: '~'
    preSteps: 
    - mkdir -p ~/.cache/zsh
    files:
    - source: zshrc
      target: .zshrc
    - source: aliases
      target: .zshaliases
    - source: profile
      target: .zprofile
    - source: antigen.zsh
      target: .antigen.zsh
    - source: completions
      target: .zshcompletions
  wezterm:
    packageName: wezterm
    files:
    - source: wezterm.lua
      parse: true
  tmux:
    enabled: false
    targetDir: ~
    files:
    - source: tmux.conf
      target: .tmux.conf
  mako:
    packageName: mako
    files:
    - source: config
      parse: true
