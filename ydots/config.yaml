global:
  installCommand: paru -S --needed %s
  dotfiles: ~/dotfiles
variables:
  background: '#1E1E2E'
  foreground: '#D9E0EE'
  cursor: '#FAE3B0'
  color0: '#6E6C7E'
  color8: '#988BA2'
  color1: '#F28FAD'
  color9: '#F28FAD'
  color2: '#ABE9B3'
  color10: '#ABE9B3'
  color3: '#FAE3B0'
  color11: '#FAE3B0'
  color4: '#96CDFB'
  color12: '#96CDFB'
  color5: '#DDB6F2'
  color13: '#DDB6F2'
  color6: '#F5C2E7'
  color14: '#F5C2E7'
  color7: '#C3BAC6'
  color15: '#D9E0EE'
modules:
  ydots: {}
  neovim:
    dirname: nvim
    packageName: neovim-git
    dependencies: 
    - fzf
    - ripgrep
    - bat
    - lazygit
    - ranger
    - xclip
    - python-neovim
    - nvim-packer-git
    - lua51-lyaml
  waybar:
    enabled: false
    packageName: waybar
    files:
    - source: style.css
      parse: true
    - config
  yambar:
    packageName: yambar
    files:
      - source: config.yaml
        parse: true
  bin:
    targetDir: ~/bin
  bspwm:
    enabled: false
    packageName: bspwm
    files:
    - source: bspwmrc
      target: bspwm
      parse: true
  fontconfig:
    targetDir: ~/.config/fontconfig/conf.d/
    files:
    - 99-monospace.conf
  kitty:
    packageName: kitty
    files:
    - source: conf
      target: kitty.conf
    - source: colors
      target: kitty.colors
      parse: true
  lazygit:
    packageName: lazygit
  misc:
    targetDir: '~'
    files:
    - source: xinitrc
      target: .xinitrc
  neofetch:
    packageName: neofetch
  picom:
    enabled: false
    packageName: picom-tryone-git
  polybar:
    enabled: false
    packageName: polybar
    files:
    - source: polybar.conf
      parse: true
  ranger:
    packageName: ranger
  river:
    packageName: river
    customSteps: 
    - chmod +x ~/.config/river/init
    files:
      - source: init
        parse: true
  sxhkd:
    enabled: false
    packageName: sxhkd
  xresources:
    targetDir: '~'
    files:
    - source: xresources
      target: .Xresources
      parse: true
  zsh:
    packageName: zsh
    targetDir: '~'
    customSteps: 
    - mkdir -p ~/.cache/zsh
    files:
    - source: zshrc
      target: .zshrc
    - source: aliases
      target: .zshaliases
    - source: profile
      target: .zprofile
    - source: antigen.zsh
      target: .antigen.zsh
    - source: completions
      target: .zshcompletions
