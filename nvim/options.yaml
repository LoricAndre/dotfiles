options:
  guifont: mono:h10
  hidden: true
  autoindent: true
  backspace: "indent,eol,start"
  smarttab: true
  incsearch: true
  wildmenu: true
  ruler: true
  scrolloff: 4
  shiftwidth: 2
  expandtab: true
  softtabstop: 2
  termguicolors: true
  number: true
  relativenumber: true
  splitbelow: true
  splitright: true
  showmode: true
  mouse: "a"
  completeopt: "menuone,noselect"
  undodir:
    lua: 'vim.fn.stdpath("data") .. "/undodir"'
  undofile: true
  timeoutlen: 300
  clipboard: "unnamedplus"
  ignorecase: true
  foldmethod: expr
  foldexpr: nvim_treesitter#foldexpr()

