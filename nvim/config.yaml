includes:
- plugins.yaml
- options.yaml
- plugins.lsp.yaml
- plugins.mappings.yaml
- plugins.alpha.yaml
globals:
  mapleader: " "
mappings:
  n:
  - ["<Tab>", "<CMD>bn<CR>"]
  - ["<S-Tab>", "<CMD>bp<CR>"]
  - ["<leader>om", "<CMD>MinimapToggle<CR>"]
  - ["m", "l"]
  - ["l", "k"]
  - ["k", "j"]
  - ["j", "h"]
  - ["<M-m>", "<C-w><C-l>"]
  - ["<M-l>", "<C-w><C-k>"]
  - ["<M-k>", "<C-w><C-j>"]
  - ["<M-j>", "<C-w><C-h>"]
  - ["<Esc>", "<CMD>noh<CR>"]
  - ["<leader><Space>", "<CMD>b#<CR>"]
  - ["<leader>Q", "<CMD>q<CR>"]
  - ["<leader>q", "<CMD>bd<CR>"]
  v:
  - ["m", "l"]
  - ["l", "k"]
  - ["k", "j"]
  - ["j", "h"]
  - ["<", "<gv"]
  - [">", ">gv"]
colorscheme: catppuccin
