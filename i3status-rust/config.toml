[theme]
file = "lule.toml"
[icons]
name = "awesome"
[icons.overrides]
backlight_empty = "Óèï "
backlight_full = "Óè£ "
backlight_partial1 = "Óèò "
backlight_partial2 = "Óèõ "
backlight_partial3 = "Óèã "
update =  ""

[[block]]
block = "music"
player = "spotify"
buttons = ["play", "next"]
hide_when_empty = true

[[block]]
block = "sound"
on_click = "pavucontrol"

[[block]]
block = "backlight"

[[block]]
block = "memory"
display_type = "memory"
format_mem = "{Mup}%"
format_swap = "{SUp}%"

[[block]]
block = "custom"
command = "/home/loric/dotfiles/status cpu"
interval = 1
json = true

[[block]]
block = "networkmanager"
on_click = "networkmanager_dmenu"

[[block]]
block = "battery"
interval = 10
format = "{percentage}% {time}"

[[block]]
block = "time"
interval = 1
format = "%a %d/%m %R:%S"
